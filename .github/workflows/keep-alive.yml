name: Supabase Keep-Alive

on:
  schedule:
    # Run every day at 00:00 UTC (around 07:00 AM WIB)
    - cron: '0 0 * * *'
  workflow_dispatch: # Allow manual trigger for testing

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Keep-Alive API
        run: |
          # Use curl to trigger the API with the secret
          curl -X GET "${{ secrets.APP_URL }}/api/cron/keep-alive?secret=${{ secrets.CRON_SECRET }}"
